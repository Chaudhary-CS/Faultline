name = "faultline"
main = "src/server.ts"
compatibility_date = "2026-03-09"
compatibility_flags = ["nodejs_compat"]

# Workers AI binding — talks to Llama 3.3 on Cloudflare's GPU
[ai]
binding = "AI"

# Durable Objects for persistent chat sessions per browser tab
[[durable_objects.bindings]]
name = "ChatAgent"
class_name = "ChatAgent"

# DO migration — required first time you deploy a new SQLite DO class
[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatAgent"]

# Radar API token — set via: npx wrangler secret put CLOUDFLARE_RADAR_TOKEN
[vars]
NODE_ENV = "production"

# Assets served by @cloudflare/vite-plugin in dev, wrangler in prod
[assets]
directory = "./dist/client"
binding = "ASSETS"
